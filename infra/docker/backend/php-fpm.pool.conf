; ─── Bët — pool PHP-FPM ──────────────────────────────────────────────────────
; Override du pool [www] par défaut. Loggue sur stderr pour `docker logs`.

[www]
user  = www-data
group = www-data

listen = 9000

; Sizing dynamique modeste (hackathon scale). À réviser sous charge réelle.
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 1000

; Timeouts
request_terminate_timeout = 120s
request_slowlog_timeout   = 10s
slowlog                   = /proc/self/fd/2

; Clear env (sécurité) — Laravel lit son propre .env
clear_env = no

; Logs vers stderr du conteneur
catch_workers_output = yes
decorate_workers_output = no
access.log = /proc/self/fd/2
