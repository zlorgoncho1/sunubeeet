; ─── Bët — overrides PHP runtime ────────────────────────────────────────────

; Uploads (audios spectateurs jusqu'à ~20 MB)
upload_max_filesize = 25M
post_max_size       = 30M
max_file_uploads    = 8

; Mémoire / temps CLI (queue jobs, blur, reverb)
memory_limit       = 256M
max_execution_time = 120

; Date par défaut (évite les warnings)
date.timezone = UTC

; Sessions stateless via JWT — pas besoin de fichiers sessions
session.use_strict_mode = 1

; Erreurs : display_errors géré par APP_DEBUG, on log toujours
display_errors = Off
log_errors     = On
error_log      = /proc/self/fd/2

; OPcache — turbo prod, désactivable en dev via APP_ENV
opcache.enable                   = 1
opcache.enable_cli               = 0
opcache.memory_consumption       = 192
opcache.interned_strings_buffer  = 16
opcache.max_accelerated_files    = 20000
opcache.validate_timestamps      = 1
opcache.revalidate_freq          = 2
opcache.fast_shutdown            = 1
opcache.jit_buffer_size          = 64M
opcache.jit                      = tracing
