# ─── Bët — nginx-edge prod ───────────────────────────────────────────────────
# Single entry point. Routes :
#   /              → static Next.js (out/) avec SPA fallback
#   /api/          → FastCGI vers backend-php (Laravel)
#   /up            → healthcheck Laravel (FastCGI)
#   /broadcasting/ → FastCGI (Echo auth des channels privés)
#   /app/, /apps/  → WebSocket + HTTP API Reverb (protocole Pusher)
#   /media/        → ⚠ Phase 1 : passthrough MinIO. Phase 2 : auth gate Laravel.

upstream php {
    server backend-php:9000;
    keepalive 16;
}

upstream reverb_ws {
    server backend-reverb:8080;
    keepalive 32;
}

upstream minio_s3 {
    server minio:9000;
    keepalive 8;
}

# Map pour WebSocket upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen      80 default_server;
    server_name _;

    # Root utilisé uniquement pour le static Next.js
    root  /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    client_max_body_size 25M;
    client_body_timeout  60s;

    # Compression
    gzip               on;
    gzip_vary          on;
    gzip_min_length    256;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_types         application/javascript application/json application/xml
                       text/css text/plain text/javascript text/xml
                       image/svg+xml font/ttf font/otf;

    # Headers sécurité
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────────────────────────────────────
    # 1) Laravel — FastCGI (déclaré AVANT le static pour priorité de match)
    # ─────────────────────────────────────────────────────────────────────────

    location ~ ^/(api|up|broadcasting)(/|$) {
        fastcgi_pass            php;
        fastcgi_index           index.php;

        include       fastcgi_params;
        # SCRIPT_FILENAME est codé en dur : c'est le chemin DANS le container backend-php.
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/public;
        fastcgi_param HTTPS           $https if_not_empty;

        # X-Forwarded pour Laravel derrière un futur proxy TLS
        fastcgi_param HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST  $host;

        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
        fastcgi_read_timeout 120s;
        fastcgi_keep_conn    on;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 2) Reverb WebSocket (protocole Pusher : /app/{key} et /apps/{id}/...)
    # ─────────────────────────────────────────────────────────────────────────

    location ~ ^/(app|apps)(/|$) {
        proxy_pass http://reverb_ws;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 3) Médias signés MinIO — ⚠ Phase 1 : passthrough simple
    # ─────────────────────────────────────────────────────────────────────────
    # SECURITY NOTE :
    # - bucket bet-media est PRIVÉ (init-bucket.sh), accès via signature query string.
    # - cette location sera REMPLACÉE en Phase 2 par un fastcgi vers
    #   MediaController@serve : (a) check policy, (b) audit log, (c) signe URL
    #   TTL 30s à la volée, (d) 302 redirect.
    location /media/ {
        proxy_pass http://minio_s3/bet-media/;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering         off;
        proxy_request_buffering off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 4) Static Next.js (output: 'export' — trailingSlash: true)
    # ─────────────────────────────────────────────────────────────────────────

    # Cache long pour les assets immuables Next.js
    location /_next/static/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif|map)$ {
        access_log off;
        expires    7d;
        add_header Cache-Control "public, max-age=604800";
        try_files  $uri =404;
    }

    # SPA fallback : sert /index.html si le path ne matche rien (routes client-side Next)
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Bloque l'accès aux fichiers cachés
    location ~ /\.(?!well-known) {
        deny all;
    }
}
