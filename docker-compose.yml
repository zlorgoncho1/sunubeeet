services:
  # === Base de données PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: mon-projet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mon_app
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d mon_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Backend Laravel ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mon-projet-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=mon_app
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # === Frontend Next.js ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mon-projet-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
