<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bët BI — API Documentation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #1e1e2e; }
    #topbar {
      padding: 10px 20px;
      background: #11111b;
      color: #cdd6f4;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #313244;
    }
    #topbar h1 { font-size: 14px; margin: 0; font-weight: 600; }
    #topbar input {
      background: #313244; color: #cdd6f4; border: 1px solid #45475a;
      border-radius: 4px; padding: 4px 8px; font-size: 12px; width: 320px;
    }
    #topbar button {
      background: #89b4fa; color: #11111b; border: 0; border-radius: 4px;
      padding: 4px 10px; font-size: 12px; cursor: pointer; font-weight: 600;
    }
    #topbar .hint { font-size: 11px; color: #7f849c; margin-left: auto; }
    #swagger-ui { background: #fff; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>Bët BI — Dashboards Admin & Coordinateur</h1>
  <label style="font-size:12px;color:#a6adc8;">Spec :</label>
  <input id="spec-url" value="./openapi-bi.yaml" />
  <button id="reload">Recharger</button>
  <span class="hint">Try-it-out → coller un JWT dans <em>Authorize</em> en haut.</span>
</div>

<div id="swagger-ui"></div>

<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
  function build(url) {
    return SwaggerUIBundle({
      url,
      dom_id: '#swagger-ui',
      deepLinking: true,
      docExpansion: 'list',
      defaultModelsExpandDepth: 0,
      tryItOutEnabled: true,
      persistAuthorization: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset,
      ],
      plugins: [SwaggerUIBundle.plugins.DownloadUrl],
      layout: 'StandaloneLayout',
    });
  }

  let ui = build(document.getElementById('spec-url').value);
  document.getElementById('reload').addEventListener('click', () => {
    ui = build(document.getElementById('spec-url').value);
  });
</script>
</body>
</html>
