# ─── Bët — Compose DEV ──────────────────────────────────────────────────────
# Stack de développement : ports individuels exposés, hot-reload via bind mount.
# Backend tourne avec `php artisan serve` (single-process, recharge auto à chaque
# requête). Frontend tourne avec `next dev`.
#
#   docker compose -f docker-compose.dev.yml up        # tout
#   docker compose -f docker-compose.dev.yml up frontend
#   docker compose -f docker-compose.dev.yml up backend backend-reverb backend-queue
#
# Les devs natifs (qui lancent `npm run dev` / `composer dev` directement) peuvent
# ne lancer que la couche data : `up postgres redis minio minio-init`.

name: bet-dev

networks:
  bet:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  backend-storage:
  # Volume nommé pour shadow-mount de node_modules (sinon le bind mount écrase
  # les binaries natifs Linux et le dev plante sur macOS/Windows).
  frontend-node-modules:
  # Idem pour vendor/ : le bind-mount ./backend/api:/var/www l'écraserait
  # sinon (vendor/ n'existe pas sur le host, c'est git-ignored).
  backend-vendor:
  # bootstrap/cache : Laravel y écrit son cache de bootstrap. En bind-mount le
  # dossier hérite des perms host (root sur macOS) et www-data ne peut pas écrire.
  backend-bootstrap-cache:

services:
  # ───────────────────────────────────────────────────────────────────────────
  # Data layer
  # ───────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-bet_db}
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"            # exposé pour TablePlus/DBeaver
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout:  3s
      retries:  10
    networks: [bet]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"         # exposé pour RedisInsight
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10
    networks: [bet]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Console UI
    healthcheck:
      test:     ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout:  3s
      retries:  10
    networks: [bet]
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT:      http://minio:9000
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET:        ${AWS_BUCKET:-bet-media}
      MINIO_CORS_ORIGIN:   ${MINIO_CORS_ORIGIN:-http://localhost:3000}
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    volumes:
      - ./infra/docker/minio/init-bucket.sh:/init-bucket.sh:ro
    networks: [bet]
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────────
  # Backend — image unique, 3 commandes (serve/queue/reverb)
  # ───────────────────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    image: bet/backend:dev
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    env_file:
      - path: .env
        required: false
    environment:
      INIT_APP:   "true"                  # primary : fait migrate + génère secrets
      APP_ENV:    local
      APP_DEBUG:  "true"
      DB_HOST:    postgres
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./backend/api:/var/www              # bind-mount = hot reload PHP
      - backend-vendor:/var/www/vendor      # vendor pré-build dans l'image, préservé
      - backend-bootstrap-cache:/var/www/bootstrap/cache
      - backend-storage:/var/www/storage    # storage en volume nommé (logs, sessions)
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:   { condition: service_healthy }
      redis:      { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    networks: [bet]
    restart: unless-stopped
    healthcheck:
      test:     ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 8000) ? 0 : 1);\""]
      interval: 10s
      timeout:  3s
      retries:  10
      start_period: 30s

  backend-queue:
    image: bet/backend:dev
    # queue:listen recharge le code à chaque job → utile pour dev. queue:work en prod.
    command: ["php", "artisan", "queue:listen", "--tries=3", "--timeout=120"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV:    local
      DB_HOST:    postgres
      REDIS_HOST: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./backend/api:/var/www
      - backend-vendor:/var/www/vendor
      - backend-bootstrap-cache:/var/www/bootstrap/cache
      - backend-storage:/var/www/storage
    depends_on:
      backend: { condition: service_healthy }   # primary a fini d'init
    networks: [bet]
    restart: unless-stopped

  backend-reverb:
    image: bet/backend:dev
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--no-interaction"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV:    local
      DB_HOST:    postgres
      REDIS_HOST: redis
    volumes:
      - ./backend/api:/var/www
      - backend-vendor:/var/www/vendor
      - backend-bootstrap-cache:/var/www/bootstrap/cache
      - backend-storage:/var/www/storage
    ports:
      - "${REVERB_PORT:-8080}:8080"
    depends_on:
      backend: { condition: service_healthy }
    networks: [bet]
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # ML API — microservice FastAPI Python (classification incidents)
  # Joint UNIQUEMENT par backend-php via http://ml-api:5000.
  # En dev on l'expose aussi sur l'hôte pour /docs et tests directs.
  # ───────────────────────────────────────────────────────────────────────────

  ml-api:
    build:
      context: .
      dockerfile: infra/docker/ml-api/Dockerfile
    image: bet/ml-api:dev
    # Override du CMD prod (gunicorn) → uvicorn --reload pour hot reload Python
    command: ["uvicorn", "ml.api.app:app", "--host", "0.0.0.0", "--port", "5000", "--reload", "--reload-dir", "/app/ml"]
    env_file:
      - path: .env
        required: false
    environment:
      PORT:             "5000"
      GROQ_API_KEY:     ${GROQ_API_KEY:-}
      OPENAI_API_KEY:   ${OPENAI_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - ./ml:/app/ml                       # bind-mount = hot reload Python
    ports:
      # Défaut 5050 pour éviter le conflit avec AirPlay Receiver sur macOS Monterey+
      # (qui squatte :5000). Override via ML_API_PORT dans .env si besoin.
      - "${ML_API_PORT:-5050}:5000"
    networks: [bet]
    restart: unless-stopped
    healthcheck:
      test:     ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 15s
      timeout:  3s
      retries:  5
      start_period: 20s

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend — next dev avec hot reload
  # ───────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile.dev
    image: bet/frontend:dev
    environment:
      NEXT_PUBLIC_API_URL:           ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_MAPBOX_TOKEN:      ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
      NEXT_PUBLIC_REVERB_APP_KEY:    ${REVERB_APP_KEY:-bet-key}
      NEXT_PUBLIC_REVERB_HOST:       ${NEXT_PUBLIC_REVERB_HOST:-localhost}
      NEXT_PUBLIC_REVERB_PORT:       ${REVERB_PORT:-8080}
      NEXT_PUBLIC_REVERB_SCHEME:     ${NEXT_PUBLIC_REVERB_SCHEME:-ws}
      NEXT_PUBLIC_POLL_INTERVAL_MS:  ${NEXT_PUBLIC_POLL_INTERVAL_MS:-5000}
      NEXT_PUBLIC_DEFAULT_LAT:       ${NEXT_PUBLIC_DEFAULT_LAT:-14.6928}
      NEXT_PUBLIC_DEFAULT_LNG:       ${NEXT_PUBLIC_DEFAULT_LNG:--17.4467}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules   # shadow mount (binaries natifs)
      - /app/.next                                # exclu du bind, géré dans le container
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks: [bet]
    restart: unless-stopped
