            }
            to {
                opacity: 1;

            }

            border: 2px solid #27ae60;
            color: #155724;
        }

                    </button>
                    <button type="button" id="stopButton" class="btn-mic-stop" style="flex: 1; padding: 12px; display: none;">
                        ⏹️ Arrêter
                    </button>
                </div>
                <div id="recordingTime" style="display: none; text-align: center; color: #e74c3c; font-weight: 600; margin-bottom: 10px;">

                </div>
                <div id="audioStatus" style="padding: 12px; border-radius: 6px; display: none; margin-top: 8px;">
                    <span id="audioStatusText"></span>
                </div>
            </div>

        </div>

            <div id="resultContent"></div>
        </div>

            </div>
            
            <!-- Géolocalisation -->
            <div class="form-group">
                <label>📍 Géolocalisation (optionnel)</label>
                <button type="button" id="geoButton" class="btn-geo" style="width: 100%; padding: 12px;">
                    📍 Activer localisation
                </button>
                <div id="geoStatus" style="padding: 12px; border-radius: 6px; display: none; margin-top: 8px;">
                    <span id="geoStatusText"></span>
                </div>
                <input type="hidden" id="latitude" name="latitude" />
                <input type="hidden" id="longitude" name="longitude" />
            </div>
            
            <!-- Boutons -->
            <div class="button-group">
                <button type="submit" class="btn-submit">🚀 Envoyer</button>
                <button type="reset" class="btn-reset">🔄 Effacer</button>
            </div>
        </form>
        
        <!-- Chargement -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Traitement en cours...</p>
        </div>
        
        <!-- Résultat -->
        <div class="result" id="result">
            <h3 id="resultTitle"></h3>
            <div id="resultContent"></div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('form');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const micButton = document.getElementById('micButton');
        const stopButton = document.getElementById('stopButton');
        const recordingTime = document.getElementById('recordingTime');
        const timer = document.getElementById('timer');
        const audioStatus = document.getElementById('audioStatus');
        const audioStatusText = document.getElementById('audioStatusText');
        const geoButton = document.getElementById('geoButton');
        const geoStatus = document.getElementById('geoStatus');
        const geoStatusText = document.getElementById('geoStatusText');
        const photoInput = document.getElementById('photo');
        const photoCanvas = document.getElementById('photoCanvas');
        const photoPreview = document.getElementById('photoPreview');
        const photoStatus = document.getElementById('photoStatus');
        const photoStatusText = document.getElementById('photoStatusText');
        const latitudeInput = document.getElementById('latitude');
        const longitudeInput = document.getElementById('longitude');
        const API_URL = 'http://localhost:5000/classifier';
        
        let audioBase64 = null;
        let photoBase64 = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingStartTime = null;
        let timerInterval = null;
        
        // Initialiser le microphone
        micButton.addEventListener('click', async (e) => {
            e.preventDefault();
            
            try {
                // Demander l'accès au microphone
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Créer le MediaRecorder
                mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];
                recordingStartTime = Date.now();
                
                // Afficher les contrôles
                micButton.style.display = 'none';
                stopButton.style.display = 'flex';
                recordingTime.style.display = 'block';
                
                // Démarrer le timer
                startTimer();
                
                // Traiter les données d'audio
                mediaRecorder.ondataavailable = (event) => {
                    recordedChunks.push(event.data);
                };
                
                // Arrêt de l'enregistrement
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(recordedChunks, { type: 'audio/webm' });
                    convertBlobToBase64(audioBlob);
                    
                    // Arrêter le flux du microphone
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                
            } catch (error) {
                showAudioError(`Erreur microphone: ${error.message}`);
            }
        });
        
        // Arrêter l'enregistrement
        stopButton.addEventListener('click', (e) => {
            e.preventDefault();
            
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                
                // Masquer les contrôles
                stopButton.style.display = 'none';
                micButton.style.display = 'flex';
                recordingTime.style.display = 'none';
                
                // Arrêter le timer
                clearInterval(timerInterval);
            }
        });
        
        // Gérer le timer
        function startTimer() {
            let seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                timer.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }
        
        // Convertir Blob en Base64
        function convertBlobToBase64(blob) {
            const reader = new FileReader();
            
            reader.onload = (event) => {
                audioBase64 = event.target.result.split(',')[1];
                
                // Afficher le statut de succès
                audioStatus.style.display = 'block';
                audioStatus.style.background = '#d4edda';
                audioStatus.style.color = '#155724';
                audioStatus.style.borderLeft = '4px solid #27ae60';
                audioStatusText.textContent = `✅ Audio enregistré (${(blob.size / 1024).toFixed(2)} KB)`;
            };
            
            reader.onerror = () => {
                showAudioError('Erreur lors du traitement de l\'audio');
                audioBase64 = null;
            };
            
            reader.readAsDataURL(blob);
        }
        
        function showAudioError(message) {
            audioStatus.style.display = 'block';
            audioStatus.style.background = '#f8d7da';
            audioStatus.style.color = '#721c24';
            audioStatus.style.borderLeft = '4px solid #e74c3c';
            audioStatusText.textContent = `❌ ${message}`;
        }
        
        // Gestion photo avec floutage
        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            
            if (!file) {
                photoPreview.innerHTML = '';
                photoBase64 = null;
                photoStatus.style.display = 'none';
                return;
            }
            
            const reader = new FileReader();
            
            reader.onload = (event) => {
                const img = new Image();
                
                img.onload = () => {
                    // Flouter l'image via canvas
                    const ctx = photoCanvas.getContext('2d');
                    photoCanvas.width = img.width;
                    photoCanvas.height = img.height;
                    
                    ctx.filter = 'blur(10px)';
                    ctx.drawImage(img, 0, 0);
                    
                    // Afficher la preview
                    photoCanvas.style.display = 'block';
                    photoBase64 = photoCanvas.toDataURL().split(',')[1];
                    
                    // Afficher le statut
                    photoStatus.style.display = 'block';
                    photoStatus.style.background = '#d4edda';
                    photoStatus.style.color = '#155724';
                    photoStatus.style.borderLeft = '4px solid #27ae60';
                    photoStatusText.textContent = `✅ Photo floutée (${(file.size / 1024).toFixed(2)} KB)`;
                };
                
                img.src = event.target.result;
            };
            
            reader.readAsDataURL(file);
        });
        
        // Gestion géolocalisation
        geoButton.addEventListener('click', (e) => {
            e.preventDefault();
            
            if (!navigator.geolocation) {
                showGeoError('Géolocalisation non supportée par votre navigateur');
                return;
            }
            
            geoButton.disabled = true;
            geoButton.textContent = '📍 Localisation...';
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    latitudeInput.value = lat;
                    longitudeInput.value = lon;
                    
                    geoStatus.style.display = 'block';
                    geoStatus.style.background = '#d4edda';
                    geoStatus.style.color = '#155724';
                    geoStatus.style.borderLeft = '4px solid #27ae60';
                    geoStatusText.textContent = `✅ Localisé: ${lat.toFixed(4)}° N, ${lon.toFixed(4)}° E`;
                    
                    geoButton.disabled = false;
                    geoButton.textContent = '📍 Localisation activée';
                },
                (error) => {
                    showGeoError(`Erreur: ${error.message}`);
                    geoButton.disabled = false;
                    geoButton.textContent = '📍 Activer localisation';
                }
            );
        });
        
        function showGeoError(message) {
            geoStatus.style.display = 'block';
            geoStatus.style.background = '#f8d7da';
            geoStatus.style.color = '#721c24';
            geoStatus.style.borderLeft = '4px solid #e74c3c';
            geoStatusText.textContent = `❌ ${message}`;
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const categorie = document.querySelector('input[name="categorie"]:checked').value;
            const description = document.getElementById('description').value.trim();
            
            // Validation: au moins description OU audio
            if (!description && !audioBase64) {
                showError('Veuillez écrire une description ou enregistrer un audio');
                return;
            }
            
            // Générer spectateur_id si pas déjà défini
            const spectateur_id = 'SPECTATEUR_' + Date.now();
            
            const payload = {
                categorie,
                description: description || null,  // Null si pas de description
                spectateur_id,
                audio_base64: audioBase64 || null,
                photo_base64: photoBase64 || null,
                latitude: latitudeInput.value ? parseFloat(latitudeInput.value) : null,
                longitude: longitudeInput.value ? parseFloat(longitudeInput.value) : null
            };
            
            // Afficher le loader
            loading.classList.add('show');
            result.classList.remove('show');
            form.style.opacity = '0.5';
            form.style.pointerEvents = 'none';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`Erreur ${response.status}`);
                }
                
                const data = await response.json();
                
                // Afficher le résultat
                showResult(data);
                
            } catch (error) {
                showError(error.message);
            } finally {
                loading.classList.remove('show');
                form.style.opacity = '1';
                form.style.pointerEvents = 'auto';
            }
        });
        
        function showResult(data) {
            let html = '';
            let resultClass = 'success';
            let titleText = '';
            
            // Adapter selon le status
            if (data.is_duplicate) {
                // ALERTE REDONDANTE (DUPLICATE)
                resultClass = 'warning';
                titleText = '⚠️ Alerte redondante détectée';
                
                html = `
                    <div class="result-item">
                        <span class="label-inline">📋 Référence :</span> ${data.reference}
                    </div>
                    <div class="result-item">
                        <span class="label-inline">Status :</span> ${data.status}
                    </div>
                    <div class="result-item">
                        <span class="label-inline">🚨 Duplicate de :</span> ${data.duplicate_of_reference}
                    </div>
                    <div class="result-item">
                        <span class="label-inline">Message :</span> ${data.message}
                    </div>
                `;
            } else if (data.status === 'processing') {
                // ALERTE ACCEPTÉE - EN ATTENTE D'ANALYSE IA
                titleText = '✅ Alerte créée et enregistrée';
                
                html = `
                    <div class="result-item">
                        <span class="label-inline">📋 Référence :</span> <strong>${data.reference}</strong>
                    </div>
                    <div class="result-item">
                        <span class="label-inline">ID Alerte :</span> ${data.alerte_id}
                    </div>
                    <div class="result-item">
                        <span class="label-inline">Status :</span> ${data.status}
                    </div>
                    <div class="result-item">
                        <span class="label-inline">🤖 Analyse :</span> En cours en arrière-plan
                    </div>
                    <div class="result-item">
                        <span class="label-inline">Message :</span> ${data.message}
                    </div>
                    <small style="color: #155724; margin-top: 15px;">✅ Vous pouvez continuer à utiliser l'application. Les résultats de l'analyse IA apparaîtront prochainement.</small>
                `;
            } else {
                // Autres statuts
                titleText = `ℹ️ ${data.message}`;
                
                html = `
                    <div class="result-item">
                        <span class="label-inline">📋 Référence :</span> ${data.reference}
                    </div>
                    <div class="result-item">
                        <span class="label-inline">Status :</span> ${data.status}
                    </div>
                `;
            }
            
            document.getElementById('resultTitle').textContent = titleText;
            document.getElementById('resultContent').innerHTML = html;
            result.classList.add('show', resultClass);
        }
        
        function showError(message) {
            document.getElementById('resultTitle').textContent = '❌ Erreur';
            document.getElementById('resultContent').innerHTML = `<div>${message}</div>`;
            result.classList.remove('success', 'warning');
            result.classList.add('show', 'error');
        }
    </script>
</body>
</html>
